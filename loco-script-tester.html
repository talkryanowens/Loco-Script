<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loco Script — Type Tester</title>
  <style>
    @font-face {
      font-family: 'LocoScript';
      src: url('https://raw.githubusercontent.com/talkryanowens/Loco-Script/main/LocoScript-Regular.otf') format('opentype');
    }
    @font-face {
      font-family: 'LocoScriptSpicy';
      src: url('https://raw.githubusercontent.com/talkryanowens/Loco-Script/main/LocoScript-Spice.otf') format('opentype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'proxima-nova', 'Proxima Nova', -apple-system, sans-serif;
      padding: 40px 32px;
    }

    .widget { max-width: 780px; margin: 0 auto; }

    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .widget-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
    }

    .controls { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }

    .toggle-group { display: flex; align-items: center; gap: 10px; }

    .toggle-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      user-select: none;
      transition: color 0.2s;
    }
    .toggle-label.active { color: #fff; }

    .toggle-track {
      position: relative;
      width: 44px;
      height: 24px;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.25s;
      flex-shrink: 0;
    }
    .toggle-track.spicy { border-color: #fff; }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #444;
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle-track.spicy .toggle-thumb {
      transform: translateX(20px);
      background: #fff;
    }

    .divider { width: 1px; height: 20px; background: #222; }

    .slider-group { display: flex; align-items: center; gap: 10px; }

    .slider-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
    }

    .size-value {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      width: 38px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 110px;
      height: 2px;
      background: #333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .type-area-wrapper {
      position: relative;
      border-top: 1px solid #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
      padding: 40px 0;
      min-height: 160px;
    }

    .placeholder-text {
      position: absolute;
      top: 40px; left: 0;
      pointer-events: none;
      color: #222;
      line-height: 1.15;
      transition: opacity 0.15s, font-family 0.2s;
    }

    .type-area {
      position: relative;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      caret-color: #fff;
      resize: none;
      line-height: 1.15;
      font-family: 'LocoScript', sans-serif;
      transition: font-family 0.2s;
      overflow: hidden;
      min-height: 100px;
    }
    .type-area.spicy { font-family: 'LocoScriptSpicy', sans-serif; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="widget-header">
      <span class="widget-title">Loco Script — Type Tester</span>
      <div class="controls">

        <div class="toggle-group">
          <span class="toggle-label active" id="label-mild">Mild</span>
          <div class="toggle-track" id="toggle" onclick="toggleSpicy()">
            <div class="toggle-thumb"></div>
          </div>
          <span class="toggle-label" id="label-spicy">Spicy</span>
        </div>

        <div class="divider"></div>

        <div class="slider-group">
          <span class="slider-label">Size</span>
          <input type="range" id="sizeSlider" min="24" max="120" value="64" oninput="updateSize(this.value)" />
          <span class="size-value" id="sizeDisplay">64px</span>
        </div>

      </div>
    </div>

    <div class="type-area-wrapper">
      <div class="placeholder-text" id="placeholder" style="font-size:64px;font-family:'LocoScript',sans-serif;">
        Type something...
      </div>
      <textarea
        class="type-area"
        id="typeArea"
        rows="2"
        style="font-size:64px;"
        spellcheck="false"
        autocomplete="off"
        oninput="handleInput()"
      ></textarea>
    </div>
  </div>

  <script>
    let isSpicy = false;

    function toggleSpicy() {
      isSpicy = !isSpicy;
      document.getElementById('toggle').classList.toggle('spicy', isSpicy);
      document.getElementById('typeArea').classList.toggle('spicy', isSpicy);
      document.getElementById('placeholder').style.fontFamily =
        isSpicy ? "'LocoScriptSpicy', sans-serif" : "'LocoScript', sans-serif";
      document.getElementById('label-mild').classList.toggle('active', !isSpicy);
      document.getElementById('label-spicy').classList.toggle('active', isSpicy);
    }

    function updateSize(val) {
      document.getElementById('typeArea').style.fontSize = val + 'px';
      document.getElementById('placeholder').style.fontSize = val + 'px';
      document.getElementById('sizeDisplay').textContent = val + 'px';
      autoGrow(document.getElementById('typeArea'));
    }

    function handleInput() {
      const ta = document.getElementById('typeArea');
      document.getElementById('placeholder').style.opacity = ta.value.length > 0 ? '0' : '1';
      autoGrow(ta);
    }

    function autoGrow(ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }
  </script>
</body>
</html>
